<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Nueva Empresa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        h1, h2, h3 { margin-top: 25px; }
        .bloque { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { font-weight: bold; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; }
        button { padding: 12px 20px; font-size: 16px; }
    </style>
</head>
<body>

    <h1>➕ Crear Nueva Empresa</h1>

    <form method="POST">
        <div class="bloque">
            <h2>Empresa</h2>
            <label>Nombre Empresa</label>
            <input type="text" name="nombre_empresa" required>

            <div class="grid">
                <div>
                    <label>Máx. Usuarios</label>
                    <input type="number" name="licencia_max_usuarios" value="10">
                </div>
                <div>
                    <label>Máx. Proyectos</label>
                    <input type="number" name="licencia_max_proyectos" value="5">
                </div>
            </div>
        </div>

        <div class="bloque">
            <h2>Proyectos</h2>
            <label>Proyecto 1</label>
            <input type="text" name="nombre_proyecto_1" required>

            <label>Proyecto 2</label>
            <input type="text" name="nombre_proyecto_2">

            <label>Proyecto 3</label>
            <input type="text" name="nombre_proyecto_3">

            <label>Proyecto 4</label>
            <input type="text" name="nombre_proyecto_4">

            <label>Proyecto 5</label>
            <input type="text" name="nombre_proyecto_5">
        </div>

        <div class="bloque">
            <h2>Supervisores</h2>

            {% for i in range(1, 6) %}
            <h3>Supervisor {{ i }}</h3>
            <div class="grid">
                <div>
                    <label>Nombre</label>
                    <input type="text" name="nombre_supervisor_{{ i }}">
                </div>
                <div>
                    <label>Correo</label>
                    <input type="email" name="correo_supervisor_{{ i }}">
                </div>
            </div>
            <label>Contraseña</label>
            <input type="password" name="pass_supervisor_{{ i }}">
            {% endfor %}
        </div>

        <div class="bloque">
            <h2>Ejecutores</h2>

            {% for i in range(1, 6) %}
            <h3>Ejecutor {{ i }}</h3>
            <div class="grid">
                <div>
                    <label>Nombre</label>
                    <input type="text" name="nombre_ejecutor_{{ i }}">
                </div>
                <div>
                    <label>Correo</label>
                    <input type="email" name="correo_ejecutor_{{ i }}">
                </div>
            </div>
            <label>Contraseña</label>
            <input type="password" name="pass_ejecutor_{{ i }}">
            {% endfor %}
        </div>

        <div style="margin-top:20px; display:flex; gap:10px;">

    <button type="submit">
        Guardar Empresa
    </button>

    <a href="{{ url_for('sa_dashboard') }}">
        <button type="button">
            Salir
        </button>
    </a>

</div>
